<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="820" height="600" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Kanban 打卡流程 · 小时级透明化</text>

  <text x="40" y="102" fill="#1f3a5f" font-size="17" font-weight="700">打卡流程</text>
  <line x1="60" y1="124" x2="60" y2="384" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arr)"/>

  <circle cx="60" cy="124" r="15" fill="#4a90d9"/>
  <text x="60" y="129" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <rect x="88" y="100" width="358" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="104" y="130" fill="#475569" font-size="17" font-weight="600">领取任务</text>

  <circle cx="60" cy="189" r="15" fill="#2e9e6b"/>
  <text x="60" y="194" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <rect x="88" y="165" width="358" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="104" y="195" fill="#475569" font-size="17" font-weight="600">开始工作</text>

  <circle cx="60" cy="254" r="15" fill="#e0a82e"/>
  <text x="60" y="259" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <rect x="88" y="230" width="358" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="104" y="260" fill="#475569" font-size="17" font-weight="600">进度更新</text>

  <circle cx="60" cy="319" r="15" fill="#d9534f"/>
  <text x="60" y="324" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">4</text>
  <rect x="88" y="295" width="358" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="104" y="325" fill="#475569" font-size="17" font-weight="600">阻碍上报</text>

  <circle cx="60" cy="384" r="15" fill="#1f3a5f"/>
  <text x="60" y="389" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">5</text>
  <rect x="88" y="360" width="358" height="48" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="104" y="390" fill="#475569" font-size="17" font-weight="600">完成交付</text>

  <text x="500" y="102" fill="#1f3a5f" font-size="17" font-weight="700">看板统计</text>

  <rect x="500" y="116" width="300" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="524" cy="145" r="8" fill="#4a90d9"/>
  <text x="544" y="142" fill="#475569" font-size="16" font-weight="600">待领取</text>
  <text x="784" y="151" fill="#4a90d9" font-size="22" font-weight="700" text-anchor="end">3</text>

  <rect x="500" y="184" width="300" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="524" cy="213" r="8" fill="#2e9e6b"/>
  <text x="544" y="210" fill="#475569" font-size="16" font-weight="600">进行中</text>
  <text x="784" y="219" fill="#2e9e6b" font-size="22" font-weight="700" text-anchor="end">5</text>

  <rect x="500" y="252" width="300" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="524" cy="281" r="8" fill="#e0a82e"/>
  <text x="544" y="278" fill="#475569" font-size="16" font-weight="600">Review 中</text>
  <text x="784" y="287" fill="#e0a82e" font-size="22" font-weight="700" text-anchor="end">2</text>

  <rect x="500" y="320" width="300" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="524" cy="349" r="8" fill="#1f3a5f"/>
  <text x="544" y="346" fill="#475569" font-size="16" font-weight="600">已完成 · 今天</text>
  <text x="784" y="355" fill="#1f3a5f" font-size="22" font-weight="700" text-anchor="end">8</text>

  <rect x="500" y="388" width="300" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="524" cy="417" r="8" fill="#d9534f"/>
  <text x="544" y="414" fill="#475569" font-size="16" font-weight="600">阻塞</text>
  <text x="784" y="423" fill="#d9534f" font-size="22" font-weight="700" text-anchor="end">1</text>

  <text x="40" y="472" fill="#1f3a5f" font-size="16" font-weight="700">关键指标</text>
  <rect x="40" y="486" width="240" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="512" fill="#64748b" font-size="13">平均完成时长</text>
  <text x="60" y="538" fill="#1f3a5f" font-size="20" font-weight="700">4.2 h</text>

  <rect x="290" y="486" width="240" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="310" y="512" fill="#64748b" font-size="13">按时完成率</text>
  <text x="310" y="538" fill="#2e9e6b" font-size="20" font-weight="700">92%</text>

  <rect x="540" y="486" width="240" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="560" y="512" fill="#64748b" font-size="13">活跃 Agent</text>
  <text x="560" y="538" fill="#4a90d9" font-size="20" font-weight="700">11</text>

  <text x="40" y="582" fill="#64748b" font-size="14">小时级打卡不是微管理，而是让每个人（含人类）随时知道项目进展。</text>
</svg>
