<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="470" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">Agent 的能力边界</text>

  <!-- Region 1: Agents good at -->
  <rect x="40" y="100" width="240" height="340" rx="12" fill="#fff" stroke="#2e9e6b" stroke-width="2"/>
  <rect x="40" y="100" width="240" height="44" rx="12" fill="#2e9e6b"/>
  <rect x="40" y="128" width="240" height="16" fill="#2e9e6b"/>
  <text x="160" y="129" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">Agent 擅长</text>
  <text x="60" y="175" fill="#475569" font-size="15">• 编写代码</text>
  <text x="60" y="210" fill="#475569" font-size="15">• 生成文档</text>
  <text x="60" y="245" fill="#475569" font-size="15">• 运行测试</text>
  <text x="60" y="280" fill="#475569" font-size="15">• 重复任务</text>
  <text x="60" y="315" fill="#475569" font-size="15">• 信息检索</text>
  <text x="60" y="350" fill="#475569" font-size="15">• 数据整理</text>
  <text x="60" y="385" fill="#475569" font-size="15">• 批量处理</text>
  <text x="60" y="420" fill="#2e9e6b" font-size="14" font-weight="700">可执行 · 可复制</text>

  <!-- Region 2: Humans good at -->
  <rect x="290" y="100" width="240" height="340" rx="12" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <rect x="290" y="100" width="240" height="44" rx="12" fill="#4a90d9"/>
  <rect x="290" y="128" width="240" height="16" fill="#4a90d9"/>
  <text x="410" y="129" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">人类擅长</text>
  <text x="310" y="175" fill="#475569" font-size="15">• 做决策</text>
  <text x="310" y="210" fill="#475569" font-size="15">• 创造创新</text>
  <text x="310" y="245" fill="#475569" font-size="15">• 沟通协调</text>
  <text x="310" y="280" fill="#475569" font-size="15">• 判断力</text>
  <text x="310" y="315" fill="#475569" font-size="15">• 分析取舍</text>
  <text x="310" y="350" fill="#475569" font-size="15">• 共情理解</text>
  <text x="310" y="385" fill="#475569" font-size="15">• 把控方向</text>
  <text x="310" y="420" fill="#4a90d9" font-size="14" font-weight="700">定目标 · 拍板</text>

  <!-- Region 3: Agents bad at -->
  <rect x="540" y="100" width="240" height="340" rx="12" fill="#fff" stroke="#d9534f" stroke-width="2"/>
  <rect x="540" y="100" width="240" height="44" rx="12" fill="#d9534f"/>
  <rect x="540" y="128" width="240" height="16" fill="#d9534f"/>
  <text x="660" y="129" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">Agent 不擅长</text>
  <text x="560" y="175" fill="#475569" font-size="15">• 幻觉/编造</text>
  <text x="560" y="210" fill="#475569" font-size="15">• 长程任务</text>
  <text x="560" y="245" fill="#475569" font-size="15">• 原创创造</text>
  <text x="560" y="280" fill="#475569" font-size="15">• 伦理判断</text>
  <text x="560" y="315" fill="#475569" font-size="15">• 审美把控</text>
  <text x="560" y="350" fill="#475569" font-size="15">• 责任归属</text>
  <text x="560" y="385" fill="#475569" font-size="15">• 临场应变</text>
  <text x="560" y="420" fill="#d9534f" font-size="14" font-weight="700">需人类兜底</text>
</svg>
