<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="820" height="600" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Sub-Agent Summary · Divide &amp; Conquer</text>

  <!-- Supervisor -->
  <rect x="310" y="96" width="200" height="62" rx="12" fill="#1f3a5f"/>
  <text x="410" y="124" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Supervisor Agent</text>
  <text x="410" y="144" fill="#ffffff" font-size="12" text-anchor="middle">× 1</text>

  <!-- connectors to main agents -->
  <line x1="410" y1="158" x2="120" y2="212" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="410" y1="158" x2="320" y2="212" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="410" y1="158" x2="520" y2="212" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="410" y1="158" x2="720" y2="212" stroke="#cbd5e1" stroke-width="2"/>

  <!-- 4 Main Agents -->
  <rect x="30" y="214" width="180" height="56" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <text x="120" y="246" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Main Agent 1</text>
  <rect x="230" y="214" width="180" height="56" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <text x="320" y="246" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Main Agent 2</text>
  <rect x="430" y="214" width="180" height="56" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <text x="520" y="246" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Main Agent 3</text>
  <rect x="630" y="214" width="180" height="56" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <text x="720" y="246" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Main Agent 4</text>

  <!-- arrow to sub pool -->
  <line x1="410" y1="270" x2="410" y2="298" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Sub-Agent pool -->
  <rect x="30" y="300" width="760" height="240" rx="12" fill="#eef2f7" stroke="#cbd5e1" stroke-width="2"/>
  <text x="410" y="328" fill="#1f3a5f" font-size="16" font-weight="700" text-anchor="middle">Sub-Agents ×11 · each owns one domain</text>

  <rect x="50" y="346" width="160" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="130" y="374" fill="#475569" font-size="14" text-anchor="middle">Review</text>
  <rect x="240" y="346" width="160" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="320" y="374" fill="#475569" font-size="14" text-anchor="middle">Testing</text>
  <rect x="430" y="346" width="160" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="510" y="374" fill="#475569" font-size="14" text-anchor="middle">Docs</text>
  <rect x="620" y="346" width="160" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="700" y="374" fill="#475569" font-size="14" text-anchor="middle">DevOps</text>

  <rect x="50" y="416" width="160" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="130" y="444" fill="#475569" font-size="14" text-anchor="middle">Research</text>
  <rect x="240" y="416" width="160" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="320" y="444" fill="#475569" font-size="14" text-anchor="middle">Security</text>
  <rect x="430" y="416" width="160" height="46" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="510" y="444" fill="#475569" font-size="14" text-anchor="middle">QA</text>
  <rect x="620" y="416" width="160" height="46" rx="8" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="700" y="444" fill="#475569" font-size="14" text-anchor="middle">… +3 more</text>

  <text x="410" y="575" fill="#475569" font-size="13" text-anchor="middle">Divide &amp; conquer — each sub-agent owns one domain, together a full-coverage team</text>
</svg>
