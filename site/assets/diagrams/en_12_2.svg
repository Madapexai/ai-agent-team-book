<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="820" height="470" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Agent Self-Evolution · Four Stages</text>

  <line x1="205" y1="215" x2="223" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="400" y1="215" x2="418" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="595" y1="215" x2="613" y2="215" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="30" y="110" width="175" height="210" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="117.5" cy="128" r="20" fill="#4a90d9"/>
  <text x="117.5" y="134" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">1</text>
  <text x="117.5" y="172" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">Observe</text>
  <text x="46" y="205" fill="#475569" font-size="11.5">• Log success/failure</text>
  <text x="46" y="232" fill="#475569" font-size="11.5">• Audit token usage</text>

  <rect x="225" y="110" width="175" height="210" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="312.5" cy="128" r="20" fill="#1f3a5f"/>
  <text x="312.5" y="134" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">2</text>
  <text x="312.5" y="172" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">Analyze</text>
  <text x="241" y="205" fill="#475569" font-size="11.5">• Find process patterns</text>
  <text x="241" y="232" fill="#475569" font-size="11.5">• Spot improvements</text>
  <text x="241" y="259" fill="#475569" font-size="11.5">• Compare history</text>

  <rect x="420" y="110" width="175" height="210" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="507.5" cy="128" r="20" fill="#2e9e6b"/>
  <text x="507.5" y="134" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">3</text>
  <text x="507.5" y="172" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">Improve</text>
  <text x="436" y="205" fill="#475569" font-size="11.5">• Tune prompts</text>
  <text x="436" y="232" fill="#475569" font-size="11.5">• Adjust workflows</text>
  <text x="436" y="259" fill="#475569" font-size="11.5">• Update knowledge</text>

  <rect x="615" y="110" width="175" height="210" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="702.5" cy="128" r="20" fill="#e0a82e"/>
  <text x="702.5" y="134" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">4</text>
  <text x="702.5" y="172" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">Verify</text>
  <text x="631" y="205" fill="#475569" font-size="11.5">• A/B test</text>
  <text x="631" y="232" fill="#475569" font-size="11.5">• Quantify results</text>
  <text x="631" y="259" fill="#475569" font-size="11.5">• Iterate loop</text>

  <text x="410" y="378" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">24h automatic loop</text>
  <line x1="702" y1="400" x2="122" y2="400" stroke="#4a90d9" stroke-width="2.5" stroke-dasharray="7,5" marker-end="url(#arr)"/>

  <text x="410" y="445" fill="#64748b" font-size="14" text-anchor="middle">An automatic evolution loop runs every 24h; humans only approve proposals.</text>
</svg>
