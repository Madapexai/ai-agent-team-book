  <!-- axis -->
  <line x1="100" y1="250" x2="720" y2="250" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="208" y1="250" x2="250" y2="250" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="438" y1="250" x2="480" y2="250" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>

  <!-- node 2025 -->
  <circle cx="180" cy="250" r="28" fill="#4a90d9"/>
  <text x="180" y="257" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">2025</text>
  <text x="180" y="212" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">2025</text>
  <rect x="50" y="310" width="260" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
