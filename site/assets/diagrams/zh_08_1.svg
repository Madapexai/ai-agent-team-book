<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="520" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">混合通信体系 · CLI / NL / 混合</text>

  <!-- CLI Mode -->
  <rect x="40" y="100" width="233" height="380" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="40" y="100" width="233" height="44" rx="12" fill="#4a90d9"/>
  <rect x="40" y="136" width="233" height="10" fill="#4a90d9"/>
  <text x="156" y="128" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">CLI 模式</text>
  <text x="156" y="160" fill="#4a90d9" font-size="13" font-weight="700" text-anchor="middle">结构化 · Structured</text>
  <text x="60" y="192" fill="#1f3a5f" font-size="13" font-weight="700">适用场景</text>
  <circle cx="62" cy="216" r="4" fill="#4a90d9"/>
  <text x="76" y="221" fill="#475569" font-size="13">Agent 间例行交互</text>
  <circle cx="62" cy="240" r="4" fill="#4a90d9"/>
  <text x="76" y="245" fill="#475569" font-size="13">状态同步</text>
  <circle cx="62" cy="264" r="4" fill="#4a90d9"/>
  <text x="76" y="269" fill="#475569" font-size="13">任务分配</text>
  <text x="60" y="312" fill="#1f3a5f" font-size="13" font-weight="700">优势</text>
  <circle cx="62" cy="336" r="4" fill="#2e9e6b"/>
  <text x="76" y="341" fill="#475569" font-size="13">精准</text>
  <circle cx="62" cy="360" r="4" fill="#2e9e6b"/>
  <text x="76" y="365" fill="#475569" font-size="13">可脚本化</text>
  <circle cx="62" cy="384" r="4" fill="#2e9e6b"/>
  <text x="76" y="389" fill="#475569" font-size="13">低 Token 消耗</text>

  <!-- NL Mode -->
  <rect x="293" y="100" width="233" height="380" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="293" y="100" width="233" height="44" rx="12" fill="#2e9e6b"/>
  <rect x="293" y="136" width="233" height="10" fill="#2e9e6b"/>
  <text x="409" y="128" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">NL 模式</text>
  <text x="409" y="160" fill="#2e9e6b" font-size="13" font-weight="700" text-anchor="middle">自然语言 · Natural</text>
  <text x="313" y="192" fill="#1f3a5f" font-size="13" font-weight="700">适用场景</text>
  <circle cx="315" cy="216" r="4" fill="#2e9e6b"/>
  <text x="329" y="221" fill="#475569" font-size="13">需求讨论</text>
  <circle cx="315" cy="240" r="4" fill="#2e9e6b"/>
  <text x="329" y="245" fill="#475569" font-size="13">Bug 描述</text>
  <text x="313" y="312" fill="#1f3a5f" font-size="13" font-weight="700">优势</text>
  <circle cx="315" cy="336" r="4" fill="#4a90d9"/>
  <text x="329" y="341" fill="#475569" font-size="13">表达丰富</text>
  <circle cx="315" cy="360" r="4" fill="#4a90d9"/>
  <text x="329" y="365" fill="#475569" font-size="13">隐含信息可传递</text>

  <!-- Hybrid Mode -->
  <rect x="546" y="100" width="233" height="380" rx="12" fill="#fff" stroke="#e0a82e" stroke-width="3"/>
  <rect x="546" y="100" width="233" height="44" rx="12" fill="#e0a82e"/>
  <rect x="546" y="136" width="233" height="10" fill="#e0a82e"/>
  <text x="662" y="128" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">混合模式 ★</text>
  <text x="662" y="160" fill="#b9841f" font-size="13" font-weight="700" text-anchor="middle">最佳实践 · Best</text>
  <text x="566" y="192" fill="#1f3a5f" font-size="13" font-weight="700">方式</text>
  <circle cx="568" cy="216" r="4" fill="#e0a82e"/>
  <text x="582" y="221" fill="#475569" font-size="13">CLI 发结构化请求</text>
  <circle cx="568" cy="240" r="4" fill="#e0a82e"/>
  <text x="582" y="245" fill="#475569" font-size="13">NL 附上下文说明</text>
  <text x="566" y="312" fill="#1f3a5f" font-size="13" font-weight="700">优势</text>
  <circle cx="568" cy="336" r="4" fill="#2e9e6b"/>
  <text x="582" y="341" fill="#475569" font-size="13">兼得精准与上下文</text>
  <circle cx="568" cy="360" r="4" fill="#2e9e6b"/>
  <text x="582" y="365" fill="#475569" font-size="13">最佳平衡</text>

  <!-- Footer note -->
  <text x="410" y="506" fill="#475569" font-size="13" text-anchor="middle">混合模式 = CLI 的精准 + NL 的上下文，是团队落地的最佳实践</text>
</svg>
