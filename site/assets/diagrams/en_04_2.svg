<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="480" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">Pick Your First Agent</text>

  <!-- Central question node -->
  <rect x="245" y="120" width="330" height="64" rx="14" fill="#4a90d9"/>
  <text x="410" y="150" fill="#fff" font-size="19" font-weight="700" text-anchor="middle">What do you want the Agent to help with?</text>
  <text x="410" y="173" fill="#eaf2fb" font-size="13" text-anchor="middle">Clarify the need before picking</text>

  <!-- Connectors -->
  <line x1="330" y1="184" x2="170" y2="255" stroke="#94a3b8" stroke-width="2"/>
  <line x1="410" y1="184" x2="410" y2="255" stroke="#94a3b8" stroke-width="2"/>
  <line x1="490" y1="184" x2="650" y2="255" stroke="#94a3b8" stroke-width="2"/>

  <!-- Branch 1: Coding -->
  <rect x="60" y="255" width="220" height="170" rx="12" fill="#fff" stroke="#2e9e6b" stroke-width="2"/>
  <circle cx="170" cy="290" r="18" fill="#2e9e6b"/>
  <text x="170" y="297" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">&#60;/&#62;</text>
  <text x="170" y="335" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">Write Code</text>
  <text x="170" y="362" fill="#475569" font-size="13" text-anchor="middle">Build features / fix bugs</text>
  <text x="170" y="384" fill="#475569" font-size="13" text-anchor="middle">→ Coding Agent</text>
  <text x="170" y="408" fill="#2e9e6b" font-size="13" font-weight="700" text-anchor="middle">Fastest payoff</text>

  <!-- Branch 2: Docs/Knowledge -->
  <rect x="300" y="255" width="220" height="170" rx="12" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <circle cx="410" cy="290" r="18" fill="#4a90d9"/>
  <text x="410" y="297" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">D</text>
  <text x="410" y="335" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">Docs &amp; Knowledge</text>
  <text x="410" y="362" fill="#475569" font-size="13" text-anchor="middle">Capture / organize / search</text>
  <text x="410" y="384" fill="#475569" font-size="13" text-anchor="middle">→ Docs Agent</text>
  <text x="410" y="408" fill="#4a90d9" font-size="13" font-weight="700" text-anchor="middle">Reduces load</text>

  <!-- Branch 3: Testing/QA -->
  <rect x="540" y="255" width="220" height="170" rx="12" fill="#fff" stroke="#e0a82e" stroke-width="2"/>
  <circle cx="650" cy="290" r="18" fill="#e0a82e"/>
  <text x="650" y="297" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">T</text>
  <text x="650" y="335" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">Testing &amp; QA</text>
  <text x="650" y="362" fill="#475569" font-size="13" text-anchor="middle">Automation / regression</text>
  <text x="650" y="384" fill="#475569" font-size="13" text-anchor="middle">→ Testing Agent</text>
  <text x="650" y="408" fill="#e0a82e" font-size="13" font-weight="700" text-anchor="middle">Holds the line</text>
</svg>
