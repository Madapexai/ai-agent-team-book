<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="820" height="560" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Roadmap · When Agent Teams Become Standard</text>

  <!-- axis -->
  <line x1="100" y1="250" x2="720" y2="250" stroke="#cbd5e1" stroke-width="3"/>
  <line x1="208" y1="250" x2="250" y2="250" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="438" y1="250" x2="480" y2="250" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>

  <!-- node 2025 -->
  <circle cx="180" cy="250" r="28" fill="#4a90d9"/>
  <text x="180" y="257" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">2025</text>
  <text x="180" y="212" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">2025</text>
  <rect x="50" y="310" width="260" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="50" y="310" width="260" height="38" rx="12" fill="#4a90d9"/>
  <rect x="50" y="330" width="260" height="18" fill="#4a90d9"/>
  <text x="180" y="335" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Implementation</text>
  <text x="180" y="382" fill="#475569" font-size="13" text-anchor="middle">80% of devs equipped</text>
  <text x="180" y="412" fill="#475569" font-size="13" text-anchor="middle">code generated by Agents</text>
  <text x="180" y="442" fill="#475569" font-size="13" text-anchor="middle">personal output jumps</text>
  <text x="180" y="472" fill="#475569" font-size="13" text-anchor="middle">from tool to team</text>

  <!-- node 2026 -->
  <circle cx="410" cy="250" r="28" fill="#2e9e6b"/>
  <text x="410" y="257" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">2026</text>
  <text x="410" y="212" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">2026</text>
  <rect x="280" y="310" width="260" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="280" y="310" width="260" height="38" rx="12" fill="#2e9e6b"/>
  <rect x="280" y="330" width="260" height="18" fill="#2e9e6b"/>
  <text x="410" y="335" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Tooling</text>
  <text x="410" y="382" fill="#475569" font-size="13" text-anchor="middle">team output up 3–5x</text>
  <text x="410" y="412" fill="#475569" font-size="13" text-anchor="middle">mature toolchains</text>
  <text x="410" y="442" fill="#475569" font-size="13" text-anchor="middle">standard protocols spread</text>
  <text x="410" y="472" fill="#475569" font-size="13" text-anchor="middle">Agent collaboration is the norm</text>

  <!-- node 2027-28 -->
  <circle cx="640" cy="250" r="28" fill="#e0a82e"/>
  <text x="640" y="257" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">27-28</text>
  <text x="640" y="212" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">2027–28</text>
  <rect x="510" y="310" width="260" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="510" y="310" width="260" height="38" rx="12" fill="#e0a82e"/>
  <rect x="510" y="330" width="260" height="18" fill="#e0a82e"/>
  <text x="640" y="335" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">Popularization</text>
  <text x="640" y="382" fill="#475569" font-size="13" text-anchor="middle">enterprises adopt widely</text>
  <text x="640" y="412" fill="#475569" font-size="13" text-anchor="middle">Agent teams are standard</text>
  <text x="640" y="442" fill="#475569" font-size="13" text-anchor="middle">humans focus on decisions</text>
  <text x="640" y="472" fill="#475569" font-size="13" text-anchor="middle">everyone has a team</text>

  <text x="410" y="540" fill="#475569" font-size="13" text-anchor="middle">From personal productivity to organizational standard — Agent teams become infrastructure</text>
</svg>
