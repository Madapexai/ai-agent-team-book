<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="820" height="600" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">子Agent架构 Sub-Agent Architecture</text>

  <!-- connecting lines from supervisor to sub-agents -->
  <line x1="410" y1="290" x2="410" y2="130" stroke="#cbd5e1" stroke-width="2.5"/>
  <line x1="410" y1="290" x2="180" y2="220" stroke="#cbd5e1" stroke-width="2.5"/>
  <line x1="410" y1="290" x2="640" y2="220" stroke="#cbd5e1" stroke-width="2.5"/>
  <line x1="410" y1="290" x2="180" y2="400" stroke="#cbd5e1" stroke-width="2.5"/>
  <line x1="410" y1="290" x2="640" y2="400" stroke="#cbd5e1" stroke-width="2.5"/>
  <line x1="410" y1="290" x2="410" y2="480" stroke="#cbd5e1" stroke-width="2.5"/>

  <!-- sub-agent nodes -->
  <g>
    <rect x="335" y="101" width="150" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="357" cy="130" r="6" fill="#1f3a5f"/>
    <text x="410" y="126" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Coding Agent</text>
    <text x="410" y="145" fill="#475569" font-size="12" text-anchor="middle">编码 Agent</text>
  </g>
  <g>
    <rect x="105" y="191" width="150" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="127" cy="220" r="6" fill="#4a90d9"/>
    <text x="180" y="216" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Review Agent</text>
    <text x="180" y="235" fill="#475569" font-size="12" text-anchor="middle">审查 Agent</text>
  </g>
  <g>
    <rect x="565" y="191" width="150" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="587" cy="220" r="6" fill="#2e9e6b"/>
    <text x="640" y="216" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Testing Agent</text>
    <text x="640" y="235" fill="#475569" font-size="12" text-anchor="middle">测试 Agent</text>
  </g>
  <g>
    <rect x="105" y="371" width="150" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="127" cy="400" r="6" fill="#e0a82e"/>
    <text x="180" y="396" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Docs Agent</text>
    <text x="180" y="415" fill="#475569" font-size="12" text-anchor="middle">文档 Agent</text>
  </g>
  <g>
    <rect x="565" y="371" width="150" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="587" cy="400" r="6" fill="#d9534f"/>
    <text x="640" y="396" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">DevOps Agent</text>
    <text x="640" y="415" fill="#475569" font-size="12" text-anchor="middle">运维 Agent</text>
  </g>
  <g>
    <rect x="335" y="451" width="150" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="357" cy="480" r="6" fill="#4a90d9"/>
    <text x="410" y="476" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Research Agent</text>
    <text x="410" y="495" fill="#475569" font-size="12" text-anchor="middle">调研 Agent</text>
  </g>

  <!-- center supervisor -->
  <rect x="315" y="252" width="190" height="76" rx="14" fill="#1f3a5f"/>
  <text x="410" y="285" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Supervisor Agent</text>
  <text x="410" y="307" fill="#ffffff" font-size="13" text-anchor="middle">监察员 ×1</text>

  <!-- count chips -->
  <rect x="120" y="535" width="180" height="44" rx="10" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="210" y="563" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Supervisor ×1</text>
  <rect x="320" y="535" width="180" height="44" rx="10" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="410" y="563" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Main Agents ×4</text>
  <rect x="520" y="535" width="180" height="44" rx="10" fill="#eef2f7" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="610" y="563" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Sub-Agents ×11</text>
</svg>
