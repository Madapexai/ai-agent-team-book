<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="820" height="480" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">From Waiting to Proposing · Two Modes</text>

  <rect x="40" y="100" width="350" height="320" rx="16" fill="#ffffff" stroke="#d9534f" stroke-width="3"/>
  <rect x="75" y="118" width="280" height="40" rx="20" fill="#d9534f"/>
  <text x="215" y="144" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">Passive Mode</text>
  <text x="215" y="205" fill="#1f3a5f" font-size="18" font-weight="700" text-anchor="middle">Human : AI = 1 : 1</text>
  <text x="72" y="245" fill="#475569" font-size="15">• Human assigns tasks</text>
  <text x="72" y="275" fill="#475569" font-size="15">• Agent executes &amp; completes</text>
  <text x="215" y="325" fill="#64748b" font-size="14" text-anchor="middle">Idle time</text>
  <text x="215" y="365" fill="#d9534f" font-size="34" font-weight="700" text-anchor="middle">50%</text>

  <line x1="394" y1="262" x2="426" y2="262" stroke="#475569" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="430" y="100" width="350" height="320" rx="16" fill="#ffffff" stroke="#2e9e6b" stroke-width="3"/>
  <rect x="465" y="118" width="280" height="40" rx="20" fill="#2e9e6b"/>
  <text x="605" y="144" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">Active Mode</text>
  <rect x="505" y="170" width="200" height="30" rx="15" fill="#e0a82e"/>
  <text x="605" y="191" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">★ Proactive Proposal</text>
  <text x="605" y="235" fill="#1f3a5f" font-size="18" font-weight="700" text-anchor="middle">Human : AI = 1 : 5</text>
  <text x="462" y="272" fill="#475569" font-size="15">• Human sets the goal</text>
  <text x="462" y="302" fill="#475569" font-size="15">• Agent analyzes &amp; proposes</text>
  <text x="605" y="348" fill="#64748b" font-size="14" text-anchor="middle">Idle time</text>
  <text x="605" y="386" fill="#2e9e6b" font-size="34" font-weight="700" text-anchor="middle">10%</text>

  <text x="410" y="455" fill="#64748b" font-size="14" text-anchor="middle">Proactive proposals cut idle time and boost efficiency.</text>
</svg>
