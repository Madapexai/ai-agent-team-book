<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect width="820" height="560" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">Letting Agents Know Each Other · Shared Memory</text>

  <!-- Sync orbit -->
  <ellipse cx="410" cy="270" rx="120" ry="95" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M404,172 L416,172 L410,184 Z" fill="#94a3b8"/>
  <path d="M404,368 L416,368 L410,356 Z" fill="#94a3b8"/>

  <!-- Central Git repo -->
  <circle cx="410" cy="270" r="80" fill="#1f3a5f"/>
  <text x="410" y="262" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">Git Repo</text>
  <text x="410" y="288" fill="#cbd5e1" font-size="13" text-anchor="middle">shared memory</text>

  <!-- Agents -->
  <line x1="410" y1="270" x2="410" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="335" y="98" width="150" height="44" rx="10" fill="#eef5fc" stroke="#4a90d9" stroke-width="2"/>
  <text x="410" y="125" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">Coding Agent</text>

  <line x1="410" y1="270" x2="686" y2="224" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="611" y="202" width="150" height="44" rx="10" fill="#eafaf1" stroke="#2e9e6b" stroke-width="2"/>
  <text x="686" y="229" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">Review Agent</text>

  <line x1="410" y1="270" x2="580" y2="391" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="505" y="369" width="150" height="44" rx="10" fill="#fdf6e7" stroke="#e0a82e" stroke-width="2"/>
  <text x="580" y="396" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">Testing Agent</text>

  <line x1="410" y1="270" x2="240" y2="391" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="165" y="369" width="150" height="44" rx="10" fill="#eef2f7" stroke="#94a3b8" stroke-width="2"/>
  <text x="240" y="396" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">Docs Agent</text>

  <line x1="410" y1="270" x2="134" y2="224" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="59" y="202" width="150" height="44" rx="10" fill="#eef2f7" stroke="#1f3a5f" stroke-width="2"/>
  <text x="134" y="229" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">DevOps Agent</text>

  <!-- Legend -->
  <text x="320" y="160" fill="#475569" font-size="12">commit &amp; push</text>
  <text x="470" y="390" fill="#475569" font-size="12">pull &amp; merge</text>

  <!-- Directory box -->
  <rect x="40" y="470" width="740" height="70" rx="12" fill="#eef5fc" stroke="#4a90d9" stroke-width="2"/>
  <text x="60" y="496" fill="#1f3a5f" font-size="14" font-weight="700">Repo directories</text>
  <text x="60" y="522" fill="#475569" font-size="14">structured-memory/ · decisions/ · progress/ · context/ · references/</text>
</svg>
