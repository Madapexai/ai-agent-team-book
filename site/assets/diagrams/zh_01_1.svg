<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="460" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">传统开发 vs Agent 团队</text>

  <!-- Card 1: Monolithic -->
  <rect x="40" y="100" width="233" height="320" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="156" y="135" fill="#475569" font-size="18" font-weight="700" text-anchor="middle">传统单体开发</text>
  <line x1="60" y1="150" x2="253" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="185" fill="#475569" font-size="15">• 1 人包揽全栈</text>
  <text x="60" y="220" fill="#475569" font-size="15">• 速度受制于个人</text>
  <text x="60" y="255" fill="#475569" font-size="15">• 单点瓶颈明显</text>
  <text x="60" y="290" fill="#475569" font-size="15">• 难以并行推进</text>
  <text x="60" y="325" fill="#475569" font-size="15">• 知识集中易断档</text>
  <text x="60" y="360" fill="#475569" font-size="15">• 覆盖时间有限</text>
  <text x="60" y="400" fill="#1f3a5f" font-size="15" font-weight="700">慢 · 易卡顿</text>

  <!-- Card 2: Traditional team -->
  <rect x="293" y="100" width="233" height="320" rx="12" fill="#fff" stroke="#d9534f" stroke-width="2"/>
  <text x="409" y="135" fill="#d9534f" font-size="18" font-weight="700" text-anchor="middle">传统团队</text>
  <line x1="313" y1="150" x2="506" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <text x="313" y="185" fill="#475569" font-size="15">• 3 人 ~¥100k/月</text>
  <text x="313" y="220" fill="#475569" font-size="15">• 沟通开销指数级</text>
  <text x="313" y="255" fill="#475569" font-size="15">• 9h/天 覆盖</text>
  <text x="313" y="290" fill="#475569" font-size="15">• 角色依赖协调</text>
  <text x="313" y="325" fill="#475569" font-size="15">• 招聘/培养周期长</text>
  <text x="313" y="360" fill="#475569" font-size="15">• 协作有信息损耗</text>
  <text x="313" y="400" fill="#d9534f" font-size="15" font-weight="700">贵 · 沟通重</text>

  <!-- Card 3: Agent team -->
  <rect x="546" y="100" width="233" height="320" rx="12" fill="#fff" stroke="#2e9e6b" stroke-width="2"/>
  <text x="662" y="135" fill="#2e9e6b" font-size="18" font-weight="700" text-anchor="middle">Agent 团队</text>
  <line x1="566" y1="150" x2="759" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <text x="566" y="185" fill="#475569" font-size="15">• ~¥30k/月</text>
  <text x="566" y="220" fill="#475569" font-size="15">• 沟通开销近零</text>
  <text x="566" y="255" fill="#475569" font-size="15">• 24h/天 覆盖</text>
  <text x="566" y="290" fill="#475569" font-size="15">• 可并行多任务</text>
  <text x="566" y="325" fill="#475569" font-size="15">• 2 周即见效</text>
  <text x="566" y="360" fill="#475569" font-size="15">• 边际成本极低</text>
  <text x="566" y="400" fill="#2e9e6b" font-size="15" font-weight="700">快 · 省钱</text>
</svg>
