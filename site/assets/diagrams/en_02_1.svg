<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="470" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">Agent Capability Boundaries</text>

  <!-- Region 1: Agents good at -->
  <rect x="40" y="100" width="240" height="340" rx="12" fill="#fff" stroke="#2e9e6b" stroke-width="2"/>
  <rect x="40" y="100" width="240" height="44" rx="12" fill="#2e9e6b"/>
  <rect x="40" y="128" width="240" height="16" fill="#2e9e6b"/>
  <text x="160" y="129" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">Agents Excel</text>
  <text x="60" y="175" fill="#475569" font-size="15">• Writing code</text>
  <text x="60" y="210" fill="#475569" font-size="15">• Generating docs</text>
  <text x="60" y="245" fill="#475569" font-size="15">• Running tests</text>
  <text x="60" y="280" fill="#475569" font-size="15">• Repetitive tasks</text>
  <text x="60" y="315" fill="#475569" font-size="15">• Information search</text>
  <text x="60" y="350" fill="#475569" font-size="15">• Data cleanup</text>
  <text x="60" y="385" fill="#475569" font-size="15">• Batch processing</text>
  <text x="60" y="420" fill="#2e9e6b" font-size="14" font-weight="700">Executable · repeatable</text>

  <!-- Region 2: Humans good at -->
  <rect x="290" y="100" width="240" height="340" rx="12" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <rect x="290" y="100" width="240" height="44" rx="12" fill="#4a90d9"/>
  <rect x="290" y="128" width="240" height="16" fill="#4a90d9"/>
  <text x="410" y="129" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">Humans Excel</text>
  <text x="310" y="175" fill="#475569" font-size="15">• Decisions</text>
  <text x="310" y="210" fill="#475569" font-size="15">• Creativity</text>
  <text x="310" y="245" fill="#475569" font-size="15">• Communication</text>
  <text x="310" y="280" fill="#475569" font-size="15">• Judgment</text>
  <text x="310" y="315" fill="#475569" font-size="15">• Trade-off analysis</text>
  <text x="310" y="350" fill="#475569" font-size="15">• Empathy</text>
  <text x="310" y="385" fill="#475569" font-size="15">• Setting direction</text>
  <text x="310" y="420" fill="#4a90d9" font-size="14" font-weight="700">Goals · final call</text>

  <!-- Region 3: Agents bad at -->
  <rect x="540" y="100" width="240" height="340" rx="12" fill="#fff" stroke="#d9534f" stroke-width="2"/>
  <rect x="540" y="100" width="240" height="44" rx="12" fill="#d9534f"/>
  <rect x="540" y="128" width="240" height="16" fill="#d9534f"/>
  <text x="660" y="129" fill="#fff" font-size="17" font-weight="700" text-anchor="middle">Agents Struggle</text>
  <text x="560" y="175" fill="#475569" font-size="15">• Hallucination</text>
  <text x="560" y="210" fill="#475569" font-size="15">• Long-horizon tasks</text>
  <text x="560" y="245" fill="#475569" font-size="15">• Original creation</text>
  <text x="560" y="280" fill="#475569" font-size="15">• Ethics</text>
  <text x="560" y="315" fill="#475569" font-size="15">• Aesthetics</text>
  <text x="560" y="350" fill="#475569" font-size="15">• Accountability</text>
  <text x="560" y="385" fill="#475569" font-size="15">• Ad-hoc response</text>
  <text x="560" y="420" fill="#d9534f" font-size="14" font-weight="700">Humans must backstop</text>
</svg>
