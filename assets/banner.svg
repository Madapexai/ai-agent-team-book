  </text>

  <line x1="80" y1="260" x2="200" y2="260" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <text x="80" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#90a4ae" letter-spacing="0.5">
    21章智能体团队实战手册
  </text>

  <text x="80" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#546e7a">
    From selecting agents to building teams, from establishing systems to preventing failures.
  </text>

  <text x="1120" y="360" font-family="monospace" font-size="13" fill="#37474f" text-anchor="end">
    Madapexai/ai-agent-team-book
  </text>
