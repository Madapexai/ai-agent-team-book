<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg1)"/>
  
  <circle cx="150" cy="100" r="60" fill="url(#accent1)" opacity="0.1"/>
  <circle cx="1050" cy="300" r="90" fill="url(#accent1)" opacity="0.08"/>
  <circle cx="900" cy="80" r="40" fill="url(#accent1)" opacity="0.12"/>
  
  <g opacity="0.15">
    <line x1="50" y1="200" x2="200" y2="200" stroke="#00d2ff" stroke-width="2"/>
    <line x1="50" y1="250" x2="150" y2="250" stroke="#00d2ff" stroke-width="2"/>
    <line x1="50" y1="300" x2="250" y2="300" stroke="#00d2ff" stroke-width="2"/>
    <circle cx="200" cy="200" r="6" fill="#00d2ff"/>
    <circle cx="150" cy="250" r="6" fill="#00d2ff"/>
    <circle cx="250" cy="300" r="6" fill="#00d2ff"/>
  </g>
  
  <g transform="translate(900, 120)" opacity="0.25">
    <rect x="0" y="0" width="60" height="80" rx="8" fill="none" stroke="#00d2ff" stroke-width="2"/>
    <rect x="80" y="20" width="60" height="80" rx="8" fill="none" stroke="#00d2ff" stroke-width="2"/>
    <rect x="160" y="-10" width="60" height="80" rx="8" fill="none" stroke="#00d2ff" stroke-width="2"/>
    <line x1="30" y1="40" x2="80" y2="60" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="110" y1="60" x2="160" y2="30" stroke="#00d2ff" stroke-width="1.5"/>
    <circle cx="30" cy="25" r="4" fill="#00d2ff"/>
    <circle cx="110" cy="45" r="4" fill="#00d2ff"/>
    <circle cx="190" cy="15" r="4" fill="#00d2ff"/>
  </g>
  
  <text x="60" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    🤖 给AI当老板
  </text>
  <text x="60" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="500" fill="#00d2ff">
    Agent 作战团队
  </text>
  <text x="60" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#a0a0c0">
    21章智能体团队实战手册
  </text>
  
  <line x1="60" y1="290" x2="300" y2="290" stroke="url(#accent1)" stroke-width="3" stroke-linecap="round"/>
  
  <text x="60" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#6b6b8b">
    从选Agent到搭团队，从建制度到防翻车
  </text>
  <text x="60" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#6b6b8b">
    从「知道」走向「做到」的实战手册
  </text>
  
  <text x="1140" y="380" font-family="monospace" font-size="14" fill="#3a3a5a" text-anchor="end">
    ai-agent-team-book
  </text>
</svg>
