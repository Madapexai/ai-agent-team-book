<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#142952"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#29b6f6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#4fc3f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <g transform="translate(880, 130)" opacity="0.15">
    <rect x="0" y="0" width="60" height="80" rx="4" fill="none" stroke="#4fc3f7" stroke-width="2"/>
    <rect x="90" y="20" width="60" height="80" rx="4" fill="none" stroke="#4fc3f7" stroke-width="2"/>
    <rect x="180" y="-10" width="60" height="80" rx="4" fill="none" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="30" y1="40" x2="90" y2="60" stroke="#4fc3f7" stroke-width="2"/>
    <line x1="120" y1="60" x2="180" y2="30" stroke="#4fc3f7" stroke-width="2"/>
    <circle cx="30" cy="25" r="5" fill="#4fc3f7"/>
    <circle cx="120" cy="45" r="5" fill="#4fc3f7"/>
    <circle cx="210" cy="15" r="5" fill="#4fc3f7"/>
  </g>

  <line x1="80" y1="120" x2="1120" y2="120" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="80" y1="320" x2="1120" y2="320" stroke="url(#lineGrad)" stroke-width="1"/>

  <text x="80" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    AI Agent Team Book
  </text>

  <text x="80" y="230" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="500" fill="#4fc3f7">
