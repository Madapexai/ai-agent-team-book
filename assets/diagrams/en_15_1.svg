<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 545" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="545" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Spend Time vs Spend Money · Cost vs Efficiency</text>

  <rect x="40" y="110" width="360" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="40" y="110" width="360" height="46" rx="12" fill="#d9534f"/>
  <rect x="40" y="140" width="360" height="16" fill="#d9534f"/>
  <text x="60" y="140" fill="#ffffff" font-size="18" font-weight="700">Manual implementation</text>

  <circle cx="66" cy="190" r="4" fill="#d9534f"/>
  <text x="80" y="195" fill="#475569" font-size="14">Refactor module: 3–5 days</text>
  <circle cx="66" cy="222" r="4" fill="#d9534f"/>
  <text x="80" y="227" fill="#475569" font-size="14">Write tests: 1–2 days</text>
  <circle cx="66" cy="254" r="4" fill="#d9534f"/>
  <text x="80" y="259" fill="#475569" font-size="14">Code review: 2–4 hours</text>
  <circle cx="66" cy="286" r="4" fill="#d9534f"/>
  <text x="80" y="291" fill="#475569" font-size="14">Docs upkeep: $2400 / week</text>

  <line x1="60" y1="312" x2="380" y2="312" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="340" fill="#2e9e6b" font-size="13">Pros: controllable quality, deep thinking</text>
  <text x="60" y="365" fill="#d9534f" font-size="13">Cons: slow, time-consuming, fatigue-prone</text>

  <rect x="420" y="110" width="360" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="420" y="110" width="360" height="46" rx="12" fill="#2e9e6b"/>
  <rect x="420" y="140" width="360" height="16" fill="#2e9e6b"/>
  <text x="440" y="140" fill="#ffffff" font-size="18" font-weight="700">Agent implementation</text>

  <circle cx="446" cy="190" r="4" fill="#2e9e6b"/>
  <text x="460" y="195" fill="#475569" font-size="14">Refactor: ~15 minutes</text>
  <circle cx="446" cy="222" r="4" fill="#2e9e6b"/>
  <text x="460" y="227" fill="#475569" font-size="14">Tests: 30 sec automated</text>
  <circle cx="446" cy="254" r="4" fill="#2e9e6b"/>
  <text x="460" y="259" fill="#475569" font-size="14">24/7 non-stop</text>
  <circle cx="446" cy="286" r="4" fill="#2e9e6b"/>
  <text x="460" y="291" fill="#475569" font-size="14">Replicable, parallel</text>

  <line x1="440" y1="312" x2="760" y2="312" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="440" y="340" fill="#2e9e6b" font-size="13">Pros: fast, always-on, replicable</text>
  <text x="440" y="365" fill="#d9534f" font-size="13">Cons: needs review, token cost</text>

  <rect x="40" y="435" width="740" height="80" rx="12" fill="#fff7ed" stroke="#e0a82e" stroke-width="2"/>
  <text x="410" y="468" fill="#b45309" font-size="16" font-weight="700" text-anchor="middle">human time × hourly rate &gt; token cost → use the Agent</text>
  <text x="410" y="494" fill="#475569" font-size="14" text-anchor="middle">50× speed-up vs only 2% cost</text>
</svg>
