<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="480" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">选定你的第一个 Agent</text>

  <!-- Central question node -->
  <rect x="245" y="120" width="330" height="64" rx="14" fill="#4a90d9"/>
  <text x="410" y="150" fill="#fff" font-size="19" font-weight="700" text-anchor="middle">你要 Agent 帮你做什么？</text>
  <text x="410" y="173" fill="#eaf2fb" font-size="13" text-anchor="middle">先想清楚需求，再选 Agent</text>

  <!-- Connectors -->
  <line x1="330" y1="184" x2="170" y2="255" stroke="#94a3b8" stroke-width="2"/>
  <line x1="410" y1="184" x2="410" y2="255" stroke="#94a3b8" stroke-width="2"/>
  <line x1="490" y1="184" x2="650" y2="255" stroke="#94a3b8" stroke-width="2"/>

  <!-- Branch 1: Coding -->
  <rect x="60" y="255" width="220" height="170" rx="12" fill="#fff" stroke="#2e9e6b" stroke-width="2"/>
  <circle cx="170" cy="290" r="18" fill="#2e9e6b"/>
  <text x="170" y="297" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">&#60;/&#62;</text>
  <text x="170" y="335" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">写代码提效</text>
  <text x="170" y="362" fill="#475569" font-size="13" text-anchor="middle">实现功能 / 修 Bug</text>
  <text x="170" y="384" fill="#475569" font-size="13" text-anchor="middle">→ 编码 Agent</text>
  <text x="170" y="408" fill="#2e9e6b" font-size="13" font-weight="700" text-anchor="middle">最快见效</text>

  <!-- Branch 2: Docs/Knowledge -->
  <rect x="300" y="255" width="220" height="170" rx="12" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <circle cx="410" cy="290" r="18" fill="#4a90d9"/>
  <text x="410" y="297" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">D</text>
  <text x="410" y="335" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">文档与知识</text>
  <text x="410" y="362" fill="#475569" font-size="13" text-anchor="middle">沉淀 / 整理 / 检索</text>
  <text x="410" y="384" fill="#475569" font-size="13" text-anchor="middle">→ 文档 Agent</text>
  <text x="410" y="408" fill="#4a90d9" font-size="13" font-weight="700" text-anchor="middle">减轻负担</text>

  <!-- Branch 3: Testing/QA -->
  <rect x="540" y="255" width="220" height="170" rx="12" fill="#fff" stroke="#e0a82e" stroke-width="2"/>
  <circle cx="650" cy="290" r="18" fill="#e0a82e"/>
  <text x="650" y="297" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">T</text>
  <text x="650" y="335" fill="#1f3a5f" font-size="17" font-weight="700" text-anchor="middle">测试与质量</text>
  <text x="650" y="362" fill="#475569" font-size="13" text-anchor="middle">自动化 / 回归</text>
  <text x="650" y="384" fill="#475569" font-size="13" text-anchor="middle">→ 测试 Agent</text>
  <text x="650" y="408" fill="#e0a82e" font-size="13" font-weight="700" text-anchor="middle">守住底线</text>
</svg>
