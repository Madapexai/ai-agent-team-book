<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="820" height="560" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Self-Evolution Loop</text>

  <!-- loop arrows (clockwise) -->
  <path d="M 490 151 A 160 160 0 0 1 549 210" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M 549 370 A 160 160 0 0 1 490 429" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M 330 429 A 160 160 0 0 1 271 370" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M 271 210 A 160 160 0 0 1 330 151" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arr)"/>

  <!-- center -->
  <circle cx="410" cy="290" r="74" fill="#eef2f7" stroke="#cbd5e1" stroke-width="2"/>
  <text x="410" y="282" fill="#1f3a5f" font-size="16" font-weight="700" text-anchor="middle">every 24h</text>
  <text x="410" y="306" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">auto-evolve</text>

  <!-- 4 nodes -->
  <rect x="335" y="98" width="150" height="64" rx="12" fill="#4a90d9"/>
  <text x="410" y="130" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Observe</text>
  <text x="410" y="150" fill="#ffffff" font-size="11" text-anchor="middle">log success/failure</text>

  <rect x="495" y="258" width="150" height="64" rx="12" fill="#e0a82e"/>
  <text x="570" y="290" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Analyze</text>
  <text x="570" y="310" fill="#ffffff" font-size="11" text-anchor="middle">find improvements</text>

  <rect x="335" y="418" width="150" height="64" rx="12" fill="#2e9e6b"/>
  <text x="410" y="450" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Improve</text>
  <text x="410" y="470" fill="#ffffff" font-size="11" text-anchor="middle">tune prompts/flow</text>

  <rect x="175" y="258" width="150" height="64" rx="12" fill="#1f3a5f"/>
  <text x="250" y="290" fill="#ffffff" font-size="16" font-weight="700" text-anchor="middle">Verify</text>
  <text x="250" y="310" fill="#ffffff" font-size="11" text-anchor="middle">A/B &amp; measure</text>

  <text x="410" y="530" fill="#475569" font-size="13" text-anchor="middle">Human only approves improvement proposals</text>
</svg>
