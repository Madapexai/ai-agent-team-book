<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 450" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="820" height="450" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Review Mechanism &amp; Feedback Loops</text>

  <text x="102" y="150" fill="#4a90d9" font-size="13" font-weight="700" text-anchor="middle">Fast · real-time</text>
  <text x="256" y="150" fill="#4a90d9" font-size="13" font-weight="700" text-anchor="middle">Medium · hourly</text>
  <text x="410" y="150" fill="#e0a82e" font-size="13" font-weight="700" text-anchor="middle">Slow · daily</text>

  <line x1="172" y1="226" x2="190" y2="226" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="326" y1="226" x2="344" y2="226" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="480" y1="226" x2="498" y2="226" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="634" y1="226" x2="652" y2="226" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="38" y="180" width="128" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="102" cy="200" r="13" fill="#4a90d9"/>
  <text x="102" y="205" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="102" y="228" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Auto-check</text>
  <text x="102" y="250" fill="#475569" font-size="11" text-anchor="middle">lint·type·unit</text>

  <rect x="192" y="180" width="128" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="256" cy="200" r="13" fill="#4a90d9"/>
  <text x="256" y="205" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="256" y="228" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">AI Review</text>
  <text x="256" y="250" fill="#475569" font-size="11" text-anchor="middle">style·logic·sec</text>

  <rect x="346" y="180" width="128" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="410" cy="200" r="13" fill="#1f3a5f"/>
  <text x="410" y="205" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="410" y="228" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Human review</text>
  <text x="410" y="250" fill="#475569" font-size="11" text-anchor="middle">arch·edge</text>

  <rect x="500" y="180" width="128" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="564" cy="200" r="13" fill="#2e9e6b"/>
  <text x="564" y="205" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">4</text>
  <text x="564" y="228" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Integration</text>
  <text x="564" y="250" fill="#475569" font-size="11" text-anchor="middle">build·e2e</text>

  <rect x="654" y="180" width="128" height="92" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="718" cy="200" r="13" fill="#2e9e6b"/>
  <text x="718" y="205" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">5</text>
  <text x="718" y="228" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">Release</text>
  <text x="718" y="250" fill="#475569" font-size="11" text-anchor="middle">canary·monitor</text>

  <path d="M 718 274 C 718 372, 102 372, 102 274" fill="none" stroke="#e0a82e" stroke-width="2.5" stroke-dasharray="7,5" marker-end="url(#arr)"/>
  <text x="410" y="352" fill="#b45309" font-size="13" font-weight="700" text-anchor="middle">Feedback loop: real-time → hourly → daily gating</text>

  <text x="410" y="412" fill="#64748b" font-size="13" text-anchor="middle">Fast feedback intercepts live; medium re-checks hourly; slow gating by humans daily.</text>
</svg>
