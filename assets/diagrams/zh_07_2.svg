<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect width="820" height="560" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">共享记忆架构 · 多 Agent 围绕 Git 仓库协作</text>

  <!-- Sync orbit -->
  <ellipse cx="410" cy="275" rx="135" ry="110" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M404,177 L416,177 L410,189 Z" fill="#94a3b8"/>
  <path d="M404,373 L416,373 L410,361 Z" fill="#94a3b8"/>

  <!-- Central Git repo -->
  <circle cx="410" cy="275" r="82" fill="#1f3a5f"/>
  <text x="410" y="267" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">Git 仓库</text>
  <text x="410" y="293" fill="#cbd5e1" font-size="13" text-anchor="middle">共享记忆</text>

  <!-- Agents (8) -->
  <line x1="410" y1="275" x2="410" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="335" y="83" width="150" height="44" rx="10" fill="#eef5fc" stroke="#4a90d9" stroke-width="2"/>
  <text x="410" y="110" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">编码 Agent</text>

  <line x1="410" y1="275" x2="619" y2="158" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="544" y="136" width="150" height="44" rx="10" fill="#eafaf1" stroke="#2e9e6b" stroke-width="2"/>
  <text x="619" y="163" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">审查 Agent</text>

  <line x1="410" y1="275" x2="705" y2="275" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="630" y="253" width="150" height="44" rx="10" fill="#fdf6e7" stroke="#e0a82e" stroke-width="2"/>
  <text x="705" y="280" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">测试 Agent</text>

  <line x1="410" y1="275" x2="622" y2="392" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="547" y="370" width="150" height="44" rx="10" fill="#eef2f7" stroke="#94a3b8" stroke-width="2"/>
  <text x="622" y="397" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">文档 Agent</text>

  <line x1="410" y1="275" x2="410" y2="440" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="335" y="418" width="150" height="44" rx="10" fill="#eef2f7" stroke="#475569" stroke-width="2"/>
  <text x="410" y="445" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">运维 Agent</text>

  <line x1="410" y1="275" x2="198" y2="392" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="123" y="370" width="150" height="44" rx="10" fill="#eef2f7" stroke="#1f3a5f" stroke-width="2"/>
  <text x="198" y="397" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">监察 Agent</text>

  <line x1="410" y1="275" x2="115" y2="275" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="40" y="253" width="150" height="44" rx="10" fill="#eef5fc" stroke="#4a90d9" stroke-width="2"/>
  <text x="115" y="280" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">调研 Agent</text>

  <line x1="410" y1="275" x2="198" y2="158" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="123" y="136" width="150" height="44" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="198" y="163" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">未来 Agent</text>

  <!-- Legend -->
  <text x="300" y="168" fill="#475569" font-size="12">commit &amp; push</text>
  <text x="470" y="392" fill="#475569" font-size="12">pull &amp; merge</text>

  <!-- Directory box -->
  <rect x="40" y="478" width="740" height="62" rx="12" fill="#eef5fc" stroke="#4a90d9" stroke-width="2"/>
  <text x="60" y="502" fill="#1f3a5f" font-size="14" font-weight="700">仓库目录</text>
  <text x="60" y="526" fill="#475569" font-size="13">structured-memory/ · decisions/ · progress/ · context/ · references/</text>
</svg>
