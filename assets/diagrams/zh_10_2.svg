  <text x="566" y="256" fill="#e2e8f0" font-size="14">• 检查进度</text>
  <text x="566" y="290" fill="#e2e8f0" font-size="14">• 发现异常</text>
  <text x="566" y="324" fill="#e2e8f0" font-size="14">• 自动干预</text>
  <rect x="566" y="356" width="188" height="48" rx="10" fill="#2e9e6b"/>
  <text x="660" y="385" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">异常自动处置</text>

  <line x1="420" y1="152" x2="540" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="420" y1="236" x2="540" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="420" y1="320" x2="540" y2="300" stroke="#d9534f" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="420" y1="404" x2="540" y2="340" stroke="#d9534f" stroke-width="2.5" marker-end="url(#arr)"/>

  <text x="40" y="512" fill="#64748b" font-size="14">升级路径：超时告警 → 自动干预 → 人工审批。</text>
