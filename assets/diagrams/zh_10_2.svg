  <text x="40" y="102" fill="#1f3a5f" font-size="17" font-weight="700">Agent 状态</text>

  <rect x="40" y="116" width="380" height="72" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="68" cy="152" r="9" fill="#2e9e6b"/>
  <text x="90" y="148" fill="#1f3a5f" font-size="17" font-weight="700">Coding A.</text>
  <text x="90" y="172" fill="#2e9e6b" font-size="14" font-weight="600">正常</text>

  <rect x="40" y="200" width="380" height="72" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="68" cy="236" r="9" fill="#2e9e6b"/>
  <text x="90" y="232" fill="#1f3a5f" font-size="17" font-weight="700">Review A.</text>
  <text x="90" y="256" fill="#2e9e6b" font-size="14" font-weight="600">正常</text>

  <rect x="40" y="284" width="380" height="72" rx="12" fill="#ffffff" stroke="#d9534f" stroke-width="2"/>
  <circle cx="68" cy="320" r="9" fill="#d9534f"/>
  <text x="90" y="316" fill="#1f3a5f" font-size="17" font-weight="700">Testing A.</text>
  <text x="90" y="340" fill="#d9534f" font-size="14" font-weight="700">异常</text>

  <rect x="40" y="368" width="380" height="72" rx="12" fill="#ffffff" stroke="#d9534f" stroke-width="2"/>
  <circle cx="68" cy="404" r="9" fill="#d9534f"/>
