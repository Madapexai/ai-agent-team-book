  <rect x="40" y="120" width="370" height="130" rx="12" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <text x="225" y="155" fill="#1f3a5f" font-size="16" font-weight="700" text-anchor="middle">每日预算墙</text>
