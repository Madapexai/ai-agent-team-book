  <text x="595" y="225" fill="#475569" font-size="13" font-weight="normal" text-anchor="middle">限制单Agent单小时消耗</text>
  <rect x="40" y="280" width="740" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="312" fill="#1f3a5f" font-size="16" font-weight="700" text-anchor="middle">月预算 $500 · 已用 57% · 剩余 $212.70</text>
  <rect x="60" y="330" width="700" height="22" rx="11" fill="#e2e8f0"/>
  <rect x="60" y="330" width="399" height="22" rx="11" fill="#4a90d9"/>
