  <text x="225" y="225" fill="#475569" font-size="13" font-weight="normal" text-anchor="middle">限制单Agent单日消耗</text>
  <rect x="410" y="120" width="370" height="130" rx="12" fill="#ffffff" stroke="#2e9e6b" stroke-width="2"/>
