<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="560" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">分工的艺术 · Agent 角色体系</text>

  <!-- Coding Agent -->
  <rect x="40" y="100" width="233" height="420" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="40" y="100" width="233" height="48" rx="12" fill="#4a90d9"/>
  <rect x="40" y="136" width="233" height="12" fill="#4a90d9"/>
  <text x="156" y="132" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">编码 Agent</text>
  <text x="60" y="178" fill="#1f3a5f" font-size="14" font-weight="700">职责</text>
  <circle cx="62" cy="202" r="4" fill="#4a90d9"/>
  <text x="76" y="207" fill="#475569" font-size="14">专职编码实现</text>
  <circle cx="62" cy="228" r="4" fill="#4a90d9"/>
  <text x="76" y="233" fill="#475569" font-size="14">编写并运行测试</text>
  <circle cx="62" cy="254" r="4" fill="#4a90d9"/>
  <text x="76" y="259" fill="#475569" font-size="14">提交代码到仓库</text>
  <rect x="56" y="300" width="201" height="150" rx="10" fill="#fdeceb" stroke="#d9534f" stroke-width="2"/>
  <text x="156" y="328" fill="#d9534f" font-size="14" font-weight="700" text-anchor="middle">边界</text>
  <text x="156" y="360" fill="#475569" font-size="14" text-anchor="middle">不审查自己的代码</text>
  <text x="156" y="388" fill="#475569" font-size="14" text-anchor="middle">交给 Review Agent</text>

  <!-- Review Agent -->
  <rect x="293" y="100" width="233" height="420" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="293" y="100" width="233" height="48" rx="12" fill="#2e9e6b"/>
  <rect x="293" y="136" width="233" height="12" fill="#2e9e6b"/>
  <text x="409" y="132" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">审查 Agent</text>
  <text x="313" y="178" fill="#1f3a5f" font-size="14" font-weight="700">职责</text>
  <circle cx="315" cy="202" r="4" fill="#2e9e6b"/>
  <text x="329" y="207" fill="#475569" font-size="14">审查代码质量</text>
  <circle cx="315" cy="228" r="4" fill="#2e9e6b"/>
  <text x="329" y="233" fill="#475569" font-size="14">提出改进建议</text>
  <circle cx="315" cy="254" r="4" fill="#2e9e6b"/>
  <text x="329" y="259" fill="#475569" font-size="14">标记风险点</text>
  <rect x="309" y="300" width="201" height="150" rx="10" fill="#fdeceb" stroke="#d9534f" stroke-width="2"/>
  <text x="409" y="328" fill="#d9534f" font-size="14" font-weight="700" text-anchor="middle">边界</text>
  <text x="409" y="360" fill="#475569" font-size="14" text-anchor="middle">不碰代码</text>
  <text x="409" y="388" fill="#475569" font-size="14" text-anchor="middle">只提建议</text>

  <!-- Testing Agent -->
  <rect x="546" y="100" width="233" height="420" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="546" y="100" width="233" height="48" rx="12" fill="#e0a82e"/>
  <rect x="546" y="136" width="233" height="12" fill="#e0a82e"/>
  <text x="662" y="132" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">测试 Agent</text>
  <text x="566" y="178" fill="#1f3a5f" font-size="14" font-weight="700">职责</text>
  <circle cx="568" cy="202" r="4" fill="#e0a82e"/>
  <text x="582" y="207" fill="#475569" font-size="14">全流程自动测试</text>
  <circle cx="568" cy="228" r="4" fill="#e0a82e"/>
  <text x="582" y="233" fill="#475569" font-size="14">生成测试报告</text>
  <circle cx="568" cy="254" r="4" fill="#e0a82e"/>
  <text x="582" y="259" fill="#475569" font-size="14">阻断回归</text>
  <rect x="562" y="300" width="201" height="150" rx="10" fill="#fdeceb" stroke="#d9534f" stroke-width="2"/>
  <text x="662" y="328" fill="#d9534f" font-size="14" font-weight="700" text-anchor="middle">边界</text>
  <text x="662" y="360" fill="#475569" font-size="14" text-anchor="middle">不决定测试策略</text>
  <text x="662" y="388" fill="#475569" font-size="14" text-anchor="middle">只执行与回报</text>
</svg>
