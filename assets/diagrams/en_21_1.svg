<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="470" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">The Infinite Employee Paradigm</text>
  <text x="410" y="92" fill="#475569" font-size="14" text-anchor="middle">At full maturity, the boss becomes the most idle person — that is the final form</text>
  <rect x="40" y="120" width="350" height="250" rx="14" fill="#ffffff" stroke="#d9534f" stroke-width="2"/>
  <text x="215" y="155" fill="#d9534f" font-size="18" font-weight="700" text-anchor="middle">Traditional (linear)</text>
  <text x="215" y="195" fill="#475569" font-size="15" font-weight="normal" text-anchor="middle">1 boss + 4–5 full-timers</text>
  <text x="215" y="230" fill="#475569" font-size="14" font-weight="normal" text-anchor="middle">Salary / office / management bandwidth</text>
  <text x="215" y="275" fill="#475569" font-size="14" font-weight="normal" text-anchor="middle">A 10-person team saturates bandwidth</text>
  <rect x="430" y="120" width="350" height="250" rx="14" fill="#ffffff" stroke="#2e9e6b" stroke-width="2"/>
  <text x="605" y="155" fill="#2e9e6b" font-size="18" font-weight="700" text-anchor="middle">Agent Team</text>
  <text x="605" y="195" fill="#475569" font-size="15" font-weight="normal" text-anchor="middle">1 person + 5 main + 5 sub Agents</text>
  <text x="605" y="230" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">~$1,500 / month API cost</text>
  <text x="605" y="275" fill="#475569" font-size="14" font-weight="normal" text-anchor="middle">Same workload, cost ≈ 2 people</text>
  <line x1="395" y1="245" x2="425" y2="245" stroke="#475569" stroke-width="3" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker></defs>
  <rect x="40" y="395" width="740" height="50" rx="10" fill="#1f3a5f"/>
  <text x="410" y="426" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">One person runs a 10-person team at the cost of ~2 employees</text>
</svg>
