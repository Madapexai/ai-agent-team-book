<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="820" height="520" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="12" fill="#1f3a5f"/>
  <text x="410" y="55" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Agent 团队成为标配</text>

  <!-- center concept -->
  <rect x="260" y="104" width="300" height="64" rx="12" fill="#1f3a5f"/>
  <text x="410" y="132" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">人人都有 Agent 团队</text>
  <text x="410" y="154" fill="#cbd5e1" font-size="12" text-anchor="middle">Agent teams for everyone</text>

  <!-- connectors -->
  <line x1="410" y1="168" x2="180" y2="214" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="410" y1="168" x2="410" y2="214" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="410" y1="168" x2="640" y2="214" stroke="#cbd5e1" stroke-width="2"/>

  <!-- column 1: Developer -->
  <circle cx="180" cy="240" r="24" fill="#4a90d9"/>
  <text x="180" y="246" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">你</text>
  <text x="180" y="284" fill="#1f3a5f" font-size="13" font-weight="700" text-anchor="middle">开发者</text>
  <rect x="90" y="300" width="180" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="90" y="300" width="180" height="32" rx="12" fill="#4a90d9"/>
  <rect x="90" y="316" width="180" height="16" fill="#4a90d9"/>
  <text x="180" y="322" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">我的 Agent 团队</text>
  <text x="180" y="362" fill="#475569" font-size="12" text-anchor="middle">Coding Agent</text>
  <text x="180" y="388" fill="#475569" font-size="12" text-anchor="middle">Review Agent</text>
  <text x="180" y="414" fill="#475569" font-size="12" text-anchor="middle">Testing Agent</text>

  <!-- column 2: PM -->
  <circle cx="410" cy="240" r="24" fill="#2e9e6b"/>
  <text x="410" y="246" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">你</text>
  <text x="410" y="284" fill="#1f3a5f" font-size="13" font-weight="700" text-anchor="middle">产品经理</text>
  <rect x="320" y="300" width="180" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="320" y="300" width="180" height="32" rx="12" fill="#2e9e6b"/>
  <rect x="320" y="316" width="180" height="16" fill="#2e9e6b"/>
  <text x="410" y="322" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">我的 Agent 团队</text>
  <text x="410" y="362" fill="#475569" font-size="12" text-anchor="middle">Research Agent</text>
  <text x="410" y="388" fill="#475569" font-size="12" text-anchor="middle">Docs Agent</text>
  <text x="410" y="414" fill="#475569" font-size="12" text-anchor="middle">Ops Agent</text>

  <!-- column 3: Designer -->
  <circle cx="640" cy="240" r="24" fill="#e0a82e"/>
  <text x="640" y="246" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">你</text>
  <text x="640" y="284" fill="#1f3a5f" font-size="13" font-weight="700" text-anchor="middle">设计师</text>
  <rect x="550" y="300" width="180" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="550" y="300" width="180" height="32" rx="12" fill="#e0a82e"/>
  <rect x="550" y="316" width="180" height="16" fill="#e0a82e"/>
  <text x="640" y="322" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">我的 Agent 团队</text>
  <text x="640" y="362" fill="#475569" font-size="12" text-anchor="middle">Design Agent</text>
  <text x="640" y="388" fill="#475569" font-size="12" text-anchor="middle">Prototype Agent</text>
  <text x="640" y="414" fill="#475569" font-size="12" text-anchor="middle">Review Agent</text>

  <text x="410" y="492" fill="#475569" font-size="13" text-anchor="middle">人仍然是老板，Agent 是团队 · 你只需定目标，团队自动生成</text>
</svg>
