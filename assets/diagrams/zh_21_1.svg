<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="470" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">无限员工范式</text>
  <text x="410" y="92" fill="#475569" font-size="14" text-anchor="middle">当Agent团队运转到极致,老板变成最闲的人——这是最终形态</text>
  <rect x="40" y="120" width="350" height="250" rx="14" fill="#ffffff" stroke="#d9534f" stroke-width="2"/>
  <text x="215" y="155" fill="#d9534f" font-size="18" font-weight="700" text-anchor="middle">传统雇佣(线性)</text>
  <text x="215" y="195" fill="#475569" font-size="15" font-weight="normal" text-anchor="middle">1 名老板 + 4–5 名全职</text>
  <text x="215" y="230" fill="#475569" font-size="14" font-weight="normal" text-anchor="middle">月薪 / 办公空间 / 管理带宽</text>
  <text x="215" y="275" fill="#475569" font-size="14" font-weight="normal" text-anchor="middle">10人团队已达管理上限</text>
  <rect x="430" y="120" width="350" height="250" rx="14" fill="#ffffff" stroke="#2e9e6b" stroke-width="2"/>
  <text x="605" y="155" fill="#2e9e6b" font-size="18" font-weight="700" text-anchor="middle">Agent团队</text>
  <text x="605" y="195" fill="#475569" font-size="15" font-weight="normal" text-anchor="middle">1 人 + 5 主Agent + 5 子Agent</text>
  <text x="605" y="230" fill="#1f3a5f" font-size="15" font-weight="700" text-anchor="middle">约 $1,500 / 月 API 成本</text>
  <text x="605" y="275" fill="#475569" font-size="14" font-weight="normal" text-anchor="middle">同等工作量,成本≈2人</text>
  <line x1="395" y1="245" x2="425" y2="245" stroke="#475569" stroke-width="3" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker></defs>
  <rect x="40" y="395" width="740" height="50" rx="10" fill="#1f3a5f"/>
  <text x="410" y="426" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">个体用两人力的成本,运营一个十人团队</text>
</svg>
