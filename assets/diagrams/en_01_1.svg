<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="460" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">Traditional Dev vs Agent Team</text>

  <!-- Card 1: Monolithic -->
  <rect x="40" y="100" width="233" height="320" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="156" y="135" fill="#475569" font-size="18" font-weight="700" text-anchor="middle">Monolithic Dev</text>
  <line x1="60" y1="150" x2="253" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <text x="60" y="185" fill="#475569" font-size="15">• 1 person, full stack</text>
  <text x="60" y="220" fill="#475569" font-size="15">• Speed capped by person</text>
  <text x="60" y="255" fill="#475569" font-size="15">• Single point bottleneck</text>
  <text x="60" y="290" fill="#475569" font-size="15">• Hard to parallelize</text>
  <text x="60" y="325" fill="#475569" font-size="15">• Knowledge siloed</text>
  <text x="60" y="360" fill="#475569" font-size="15">• Limited coverage hours</text>
  <text x="60" y="400" fill="#1f3a5f" font-size="15" font-weight="700">Slow · stalls</text>

  <!-- Card 2: Traditional team -->
  <rect x="293" y="100" width="233" height="320" rx="12" fill="#fff" stroke="#d9534f" stroke-width="2"/>
  <text x="409" y="135" fill="#d9534f" font-size="18" font-weight="700" text-anchor="middle">Traditional Team</text>
  <line x1="313" y1="150" x2="506" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <text x="313" y="185" fill="#475569" font-size="15">• 3 people ~¥100k/mo</text>
  <text x="313" y="220" fill="#475569" font-size="15">• Exponential comms</text>
  <text x="313" y="255" fill="#475569" font-size="15">• 9h / day coverage</text>
  <text x="313" y="290" fill="#475569" font-size="15">• Role-coordination heavy</text>
  <text x="313" y="325" fill="#475569" font-size="15">• Slow to hire/train</text>
  <text x="313" y="360" fill="#475569" font-size="15">• Info loss in handoffs</text>
  <text x="313" y="400" fill="#d9534f" font-size="15" font-weight="700">Costly · chatty</text>

  <!-- Card 3: Agent team -->
  <rect x="546" y="100" width="233" height="320" rx="12" fill="#fff" stroke="#2e9e6b" stroke-width="2"/>
  <text x="662" y="135" fill="#2e9e6b" font-size="18" font-weight="700" text-anchor="middle">Agent Team</text>
  <line x1="566" y1="150" x2="759" y2="150" stroke="#cbd5e1" stroke-width="1"/>
  <text x="566" y="185" fill="#475569" font-size="15">• ~¥30k / month</text>
  <text x="566" y="220" fill="#475569" font-size="15">• Near-zero comms</text>
  <text x="566" y="255" fill="#475569" font-size="15">• 24h / day coverage</text>
  <text x="566" y="290" fill="#475569" font-size="15">• Parallel tasks</text>
  <text x="566" y="325" fill="#475569" font-size="15">• Results in ~2 weeks</text>
  <text x="566" y="360" fill="#475569" font-size="15">• Tiny marginal cost</text>
  <text x="566" y="400" fill="#2e9e6b" font-size="15" font-weight="700">Fast · cheap</text>
</svg>
