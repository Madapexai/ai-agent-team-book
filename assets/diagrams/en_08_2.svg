<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e0a82e"/></marker>
  </defs>
  <rect width="820" height="560" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">Hybrid Communication · Three Modes Compared</text>

  <!-- CLI Mode -->
  <rect x="40" y="96" width="233" height="356" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="40" y="96" width="233" height="44" rx="12" fill="#4a90d9"/>
  <rect x="40" y="132" width="233" height="10" fill="#4a90d9"/>
  <text x="156" y="124" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">CLI Mode</text>
  <text x="156" y="156" fill="#4a90d9" font-size="13" font-weight="700" text-anchor="middle">Structured</text>
  <text x="60" y="188" fill="#1f3a5f" font-size="13" font-weight="700">Use cases</text>
  <circle cx="62" cy="212" r="4" fill="#4a90d9"/>
  <text x="76" y="217" fill="#475569" font-size="13">Routine Agent interaction</text>
  <circle cx="62" cy="236" r="4" fill="#4a90d9"/>
  <text x="76" y="241" fill="#475569" font-size="13">Status sync</text>
  <circle cx="62" cy="260" r="4" fill="#4a90d9"/>
  <text x="76" y="265" fill="#475569" font-size="13">Task assignment</text>
  <text x="60" y="308" fill="#1f3a5f" font-size="13" font-weight="700">Advantages</text>
  <circle cx="62" cy="332" r="4" fill="#2e9e6b"/>
  <text x="76" y="337" fill="#475569" font-size="13">Precise</text>
  <circle cx="62" cy="356" r="4" fill="#2e9e6b"/>
  <text x="76" y="361" fill="#475569" font-size="13">Scriptable</text>
  <circle cx="62" cy="380" r="4" fill="#2e9e6b"/>
  <text x="76" y="385" fill="#475569" font-size="13">Low token cost</text>

  <!-- NL Mode -->
  <rect x="293" y="96" width="233" height="356" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="293" y="96" width="233" height="44" rx="12" fill="#2e9e6b"/>
  <rect x="293" y="132" width="233" height="10" fill="#2e9e6b"/>
  <text x="409" y="124" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">NL Mode</text>
  <text x="409" y="156" fill="#2e9e6b" font-size="13" font-weight="700" text-anchor="middle">Natural language</text>
  <text x="313" y="188" fill="#1f3a5f" font-size="13" font-weight="700">Use cases</text>
  <circle cx="315" cy="212" r="4" fill="#2e9e6b"/>
  <text x="329" y="217" fill="#475569" font-size="13">Requirement discussion</text>
  <circle cx="315" cy="236" r="4" fill="#2e9e6b"/>
  <text x="329" y="241" fill="#475569" font-size="13">Bug description</text>
  <text x="313" y="308" fill="#1f3a5f" font-size="13" font-weight="700">Advantages</text>
  <circle cx="315" cy="332" r="4" fill="#4a90d9"/>
  <text x="329" y="337" fill="#475569" font-size="13">Rich expression</text>
  <circle cx="315" cy="356" r="4" fill="#4a90d9"/>
  <text x="329" y="361" fill="#475569" font-size="13">Conveys implicit info</text>

  <!-- Hybrid Mode -->
  <rect x="546" y="96" width="233" height="356" rx="12" fill="#fff" stroke="#e0a82e" stroke-width="3"/>
  <rect x="546" y="96" width="233" height="44" rx="12" fill="#e0a82e"/>
  <rect x="546" y="132" width="233" height="10" fill="#e0a82e"/>
  <text x="662" y="124" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Hybrid ★</text>
  <text x="662" y="156" fill="#b9841f" font-size="13" font-weight="700" text-anchor="middle">Best practice</text>
  <text x="566" y="188" fill="#1f3a5f" font-size="13" font-weight="700">How</text>
  <circle cx="568" cy="212" r="4" fill="#e0a82e"/>
  <text x="582" y="217" fill="#475569" font-size="13">CLI sends structured req</text>
  <circle cx="568" cy="236" r="4" fill="#e0a82e"/>
  <text x="582" y="241" fill="#475569" font-size="13">NL attaches context</text>
  <text x="566" y="308" fill="#1f3a5f" font-size="13" font-weight="700">Advantages</text>
  <circle cx="568" cy="332" r="4" fill="#2e9e6b"/>
  <text x="582" y="337" fill="#475569" font-size="13">Precision + context</text>
  <circle cx="568" cy="356" r="4" fill="#2e9e6b"/>
  <text x="582" y="361" fill="#475569" font-size="13">Best balance</text>

  <!-- Flow: CLI + NL -> Hybrid -->
  <rect x="120" y="490" width="140" height="44" rx="10" fill="#eef5fc" stroke="#4a90d9" stroke-width="2"/>
  <text x="190" y="517" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">CLI</text>
  <rect x="300" y="490" width="140" height="44" rx="10" fill="#eafaf1" stroke="#2e9e6b" stroke-width="2"/>
  <text x="370" y="517" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">NL</text>
  <line x1="260" y1="512" x2="510" y2="512" stroke="#e0a82e" stroke-width="2" marker-end="url(#b)"/>
  <line x1="440" y1="512" x2="510" y2="512" stroke="#e0a82e" stroke-width="2" marker-end="url(#b)"/>
  <rect x="510" y="490" width="200" height="44" rx="10" fill="#fdf6e7" stroke="#e0a82e" stroke-width="3"/>
  <text x="610" y="517" fill="#1f3a5f" font-size="14" font-weight="700" text-anchor="middle">Hybrid</text>
</svg>
