<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="820" height="430" fill="#f8fafc"/>
  <rect x="20" y="20" width="780" height="56" rx="10" fill="#1f3a5f"/>
  <text x="410" y="56" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Budget Wall and Rate Wall</text>
  <text x="410" y="92" fill="#475569" font-size="14" text-anchor="middle">Treat API cost as consumable budget, not fixed capital</text>
  <rect x="40" y="120" width="370" height="130" rx="12" fill="#ffffff" stroke="#4a90d9" stroke-width="2"/>
  <text x="225" y="155" fill="#1f3a5f" font-size="16" font-weight="700" text-anchor="middle">Daily budget wall</text>
  <text x="225" y="195" fill="#1f3a5f" font-size="22" font-weight="700" text-anchor="middle">$15.00 / per Agent</text>
  <text x="225" y="225" fill="#475569" font-size="13" font-weight="normal" text-anchor="middle">caps one Agent's daily spend</text>
  <rect x="410" y="120" width="370" height="130" rx="12" fill="#ffffff" stroke="#2e9e6b" stroke-width="2"/>
  <text x="595" y="155" fill="#1f3a5f" font-size="16" font-weight="700" text-anchor="middle">Hourly budget wall</text>
  <text x="595" y="195" fill="#1f3a5f" font-size="22" font-weight="700" text-anchor="middle">$3.00 / per Agent</text>
  <text x="595" y="225" fill="#475569" font-size="13" font-weight="normal" text-anchor="middle">caps one Agent's hourly spend</text>
  <rect x="40" y="280" width="740" height="90" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="312" fill="#1f3a5f" font-size="16" font-weight="700" text-anchor="middle">Monthly budget $500 · Used 57% · Remaining $212.70</text>
  <rect x="60" y="330" width="700" height="22" rx="11" fill="#e2e8f0"/>
  <rect x="60" y="330" width="399" height="22" rx="11" fill="#4a90d9"/>
  <text x="410" y="400" fill="#475569" font-size="14" font-weight="normal" text-anchor="middle">Like a prepaid card: cuts off when empty, never overspends</text>
</svg>
